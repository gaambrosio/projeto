<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Farmabete</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<section class="banner" style="min-height: 100vh; display: flex; align-items: center; justify-content: center;">
    <div class="product" style="width: 100%; max-width: 400px; text-align: left;">
        
        <form id="form-cadastro">
            <h2 style="margin-bottom: 20px; text-align: center;">Criar Conta</h2>
            
            <label>Nome Completo</label>
            <input type="text" id="nome" placeholder="Seu nome" required style="width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 8px; border: none;">

            <label>E-mail</label>
            <input type="email" id="email" placeholder="seu@email.com" required style="width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 8px; border: none;">

            <label>Senha</label>
            <input type="password" id="senha" placeholder="******" required style="width: 100%; padding: 10px; margin-bottom: 20px; border-radius: 8px; border: none;">

            <button type="submit" class="nav-btn" style="background: #2979FF; color: white; width: 100%; padding: 15px; border: none;">
                Finalizar Cadastro
            </button>
        </form>

        <div id="mensagem-status" style="display: none; text-align: center;">
            <div style="font-size: 60px; margin-bottom: 10px;">✅</div>
            <h2 style="color: #4CAF50; margin-bottom: 10px;">Cadastro Concluído!</h2>
            <p style="margin-bottom: 20px;">Seu perfil foi criado com sucesso.</p>
            <button onclick="window.location.href='index.html'" class="nav-btn" style="width: 100%; background: #2979FF; color: white;">
                VOLTAR PARA A LOJA
            </button>
        </div>
    </div>
</section>

<script src="script.js"></script>
</body>
</html>
